<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ดูอย่างเดียว - ดงงูพิษ ทราเวล</title>
<meta name="theme-color" content="#0B1E2D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1E2D; --bg-elev:#122C3F; --bg-elev-2:#1A3B52;
    --text:#F4EDE4; --text-dim:#9FB4C2; --accent:#F2A65A; --accent2:#5FBFB3;
    --danger:#E8604C; --border:rgba(244,237,228,0.12); --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(1200px 800px at 50% -10%, #163046 0%, var(--bg) 55%);
    color:var(--text); font-family:'Noto Sans Thai', sans-serif;
    min-height:100vh; padding:20px 16px 60px;
  }
  .wrap{max-width:520px; margin:0 auto;}
  h1{font-family:'Noto Serif Thai', serif; font-size:20px; margin:4px 0 2px;}
  .banner{
    background:rgba(242,166,90,0.12); border:1px solid var(--accent); color:var(--accent);
    font-size:12.5px; padding:10px 12px; border-radius:10px; margin:10px 0 18px; line-height:1.5;
  }
  .card{
    background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
  }
  label{font-size:13px; color:var(--text-dim); display:block; margin-bottom:6px;}
  input{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
    background:var(--bg-elev-2); color:var(--text); font-size:16px; font-family:inherit;
  }
  input:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .btn{
    width:100%; padding:13px; border-radius:12px; border:none; font-size:15px; font-weight:700;
    cursor:pointer; margin-top:12px; font-family:inherit;
  }
  .btn-primary{background:var(--accent); color:#2a1a06;}
  .btn-outline{background:transparent; color:var(--text); border:1.5px solid var(--border);}
  .err{color:var(--danger); font-size:13px; margin-top:8px; min-height:16px;}
  .hidden{display:none;}
  .stat-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);}
  .stat-row:last-child{border-bottom:none;}
  .stat-name{font-weight:600;}
  .stat-amt{font-weight:700;}
  .pos{color:var(--accent2);}
  .neg{color:var(--danger);}
  .settle-row{display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px;}
  .settle-row:last-child{border-bottom:none;}
  .expense-card{padding:10px 0; border-bottom:1px solid var(--border);}
  .expense-card:last-child{border-bottom:none;}
  .expense-top{display:flex; justify-content:space-between; gap:10px;}
  .expense-note{font-weight:600;}
  .expense-amt{font-weight:700; white-space:nowrap;}
  .expense-meta{font-size:12.5px; color:var(--text-dim); margin-top:2px;}
  .empty-state{text-align:center; color:var(--text-dim); font-size:13.5px; padding:20px 0;}
  .top-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .icon-btn{background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:4px;}
  .section-title{font-size:14px; font-weight:700; margin:0 0 10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.03em;}
  .trip-meta-sub{font-size:13px; color:var(--text-dim); margin:0 0 16px;}
  .spinner{text-align:center; color:var(--text-dim); font-size:13.5px; padding:30px 0;}
</style>
</head>
<body>
<div class="wrap">

  <div id="screen-code">
    <h1>👀 ดูข้อมูลทริป (อ่านอย่างเดียว)</h1>
    <div class="banner">หน้านี้ดูข้อมูลได้อย่างเดียว ไม่สามารถเพิ่ม/แก้ไข/ลบรายการใดๆ ได้ ต้องใส่รหัสทริปทุกครั้งที่เข้าดู</div>
    <div class="card">
      <label>รหัสทริป (6 หลัก)</label>
      <input type="text" id="code-input" maxlength="6" autocomplete="off" placeholder="เช่น ABC123" style="text-transform:uppercase; letter-spacing:2px; text-align:center; font-size:20px;">
      <div class="err" id="code-err"></div>
      <button class="btn btn-primary" id="btn-view">ดูข้อมูล</button>
    </div>
  </div>

  <div id="screen-result" class="hidden">
    <div class="top-row">
      <button class="icon-btn" id="btn-back">←</button>
      <button class="icon-btn" id="btn-refresh" title="รีเฟรช">🔄</button>
    </div>
    <div id="result-content"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  var FIREBASE_CONFIG = {
    apiKey: "AIzaSyCYChz5bigDRqvakUHUohwY2037Acan64A",
    authDomain: "trip-expense-tracker-75158.firebaseapp.com",
    projectId: "trip-expense-tracker-75158",
    storageBucket: "trip-expense-tracker-75158.firebasestorage.app",
    messagingSenderId: "555907020320",
    appId: "1:555907020320:web:f393e9dad205f0ca7d2e45"
  };
  var db = null;
  function getDb(){
    if(db) return db;
    if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    return db;
  }

  var CATS = [
    {key:'food', label:'อาหาร', icon:'🍜'},
    {key:'stay', label:'ที่พัก', icon:'🏨'},
    {key:'transport', label:'เดินทาง', icon:'🚗'},
    {key:'shopping', label:'ช้อปปิ้ง', icon:'🛍️'},
    {key:'activity', label:'กิจกรรม', icon:'🎟️'},
    {key:'other', label:'อื่นๆ', icon:'💰'}
  ];
  var CAT_MAP = {}; CATS.forEach(function(c){ CAT_MAP[c.key] = c; });
  var LOCALE_MAP = {THB:'th-TH', USD:'en-US', EUR:'de-DE', JPY:'ja-JP', GBP:'en-GB', SGD:'en-SG'};

  function fmt(amount, currency){
    currency = currency || 'THB';
    try{
      return new Intl.NumberFormat(LOCALE_MAP[currency] || 'th-TH', {
        style:'currency', currency:currency, maximumFractionDigits: currency==='JPY' ? 0 : 2
      }).format(amount || 0);
    }catch(e){ return (amount||0).toFixed(2) + ' ' + currency; }
  }

  function fmtDMY(dateStr){
    if(!dateStr) return '';
    var p = dateStr.split('-');
    if(p.length !== 3) return dateStr;
    return p[2] + '/' + p[1] + '/' + p[0];
  }

  function computeBalances(trip){
    var totals = {};
    trip.members.forEach(function(m){ totals[m.name] = 0; });
    trip.expenses.forEach(function(e){
      if(!e.splitBetween || !e.splitBetween.length) return;
      var share = e.amount / e.splitBetween.length;
      if(typeof totals[e.paidBy] === 'number') totals[e.paidBy] += e.amount;
      e.splitBetween.forEach(function(name){
        if(typeof totals[name] === 'number') totals[name] -= share;
      });
    });
    return totals;
  }

  function simplifyDebts(totals){
    var creditors = [], debtors = [];
    Object.keys(totals).forEach(function(name){
      var v = totals[name];
      if(v > 0.01) creditors.push({name:name, amt:v});
      else if(v < -0.01) debtors.push({name:name, amt:-v});
    });
    creditors.sort(function(a,b){ return b.amt - a.amt; });
    debtors.sort(function(a,b){ return b.amt - a.amt; });
    var tx = [], i=0, j=0;
    while(i < debtors.length && j < creditors.length){
      var d = debtors[i], c = creditors[j];
      var amt = Math.min(d.amt, c.amt);
      tx.push({from:d.name, to:c.name, amount:amt});
      d.amt -= amt; c.amt -= amt;
      if(d.amt < 0.01) i++;
      if(c.amt < 0.01) j++;
    }
    return tx;
  }

  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  var currentCode = null;

  async function fetchTrip(code){
    var docSnap = await getDb().collection('trips').doc(code).get();
    if(!docSnap.exists) return null;
    var d = docSnap.data();
    return d && d.data ? d.data : null;
  }

  function renderTrip(trip){
    var totals = computeBalances(trip);
    var settle = simplifyDebts(totals);
    var currency = trip.meta.currency || 'THB';

    var html = '';
    html += '<h1>' + escapeHtml(trip.meta.name) + '</h1>';
    var dates = (trip.meta.startDate || trip.meta.endDate) ? (fmtDMY(trip.meta.startDate) + (trip.meta.endDate ? ' - ' + fmtDMY(trip.meta.endDate) : '')) : '';
    html += '<p class="trip-meta-sub">' + escapeHtml(dates) + (trip.meta.status === 'closed' ? ' · ทริปนี้ปิดแล้ว' : '') + '</p>';

    // balances
    html += '<div class="card"><p class="section-title">ยอดสุทธิของแต่ละคน</p>';
    trip.members.forEach(function(m){
      var v = totals[m.name] || 0;
      var cls = v > 0.01 ? 'pos' : (v < -0.01 ? 'neg' : '');
      var label = v > 0.01 ? 'ได้คืน ' + fmt(v, currency) : (v < -0.01 ? 'ต้องจ่าย ' + fmt(-v, currency) : 'เท่ากันพอดี');
      html += '<div class="stat-row"><span class="stat-name">' + escapeHtml(m.name) + '</span><span class="stat-amt ' + cls + '">' + label + '</span></div>';
    });
    html += '</div>';

    // settle up
    html += '<div class="card"><p class="section-title">ใครโอนให้ใครบ้าง</p>';
    if(!settle.length){
      html += '<div class="empty-state">ไม่มีใครติดใครแล้ว 🎉</div>';
    } else {
      settle.forEach(function(tx){
        html += '<div class="settle-row"><span>' + escapeHtml(tx.from) + '</span><span>→</span><span>' + escapeHtml(tx.to) + '</span><span style="margin-left:auto; font-weight:700;">' + fmt(tx.amount, currency) + '</span></div>';
      });
    }
    html += '</div>';

    // expenses
    html += '<div class="card"><p class="section-title">รายการค่าใช้จ่าย (' + trip.expenses.length + ')</p>';
    if(!trip.expenses.length){
      html += '<div class="empty-state">ยังไม่มีรายการ</div>';
    } else {
      var sorted = trip.expenses.slice().sort(function(a,b){ return (b.ts||0) - (a.ts||0); });
      sorted.forEach(function(e){
        var cat = CAT_MAP[e.category] || CAT_MAP.other;
        html += '<div class="expense-card">';
        html += '<div class="expense-top"><span class="expense-note">' + cat.icon + ' ' + escapeHtml(e.note || cat.label) + '</span><span class="expense-amt">' + fmt(e.amount, currency) + '</span></div>';
        html += '<div class="expense-meta">' + escapeHtml(e.paidBy) + ' จ่าย · หาร ' + (e.splitBetween ? e.splitBetween.length : 0) + ' คน</div>';
        html += '</div>';
      });
    }
    html += '</div>';

    document.getElementById('result-content').innerHTML = html;
  }

  async function doView(){
    var code = document.getElementById('code-input').value.trim().toUpperCase();
    var errEl = document.getElementById('code-err');
    errEl.textContent = '';
    if(!code || code.length !== 6){
      errEl.textContent = 'กรอกรหัสทริป 6 หลักให้ครบ';
      return;
    }
    document.getElementById('result-content').innerHTML = '<div class="spinner">⏳ กำลังโหลดข้อมูล...</div>';
    document.getElementById('screen-code').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    try{
      var trip = await fetchTrip(code);
      if(!trip){
        document.getElementById('result-content').innerHTML = '<div class="empty-state">ไม่พบทริปรหัสนี้ ตรวจสอบรหัสอีกครั้ง</div>';
        return;
      }
      currentCode = code;
      renderTrip(trip);
    }catch(e){
      console.error(e);
      document.getElementById('result-content').innerHTML = '<div class="empty-state">โหลดข้อมูลไม่สำเร็จ ลองใหม่อีกครั้ง (ต้องมีอินเทอร์เน็ต)</div>';
    }
  }

  document.getElementById('btn-view').addEventListener('click', doView);
  document.getElementById('code-input').addEventListener('keydown', function(ev){
    if(ev.key === 'Enter') doView();
  });
  document.getElementById('btn-back').addEventListener('click', function(){
    document.getElementById('screen-result').classList.add('hidden');
    document.getElementById('screen-code').classList.remove('hidden');
    currentCode = null;
  });
  document.getElementById('btn-refresh').addEventListener('click', async function(){
    if(!currentCode) return;
    document.getElementById('result-content').innerHTML = '<div class="spinner">⏳ กำลังโหลดข้อมูล...</div>';
    try{
      var trip = await fetchTrip(currentCode);
      if(trip) renderTrip(trip);
    }catch(e){ console.error(e); }
  });
})();
</script>
</body>
</html>
